# Example nginx config for Open E-commerce installed at /shop on shared nginx.
# Adjust paths and PHP-FPM socket to match your environment.

# --- Block sensitive paths first (^~ wins over the shop alias via longer prefix) ---
location ^~ /shop/.env    { deny all; return 404; }
location ^~ /shop/.git    { deny all; return 404; }
location ^~ /shop/.github { deny all; return 404; }
location ^~ /shop/app/        { deny all; return 404; }
location ^~ /shop/bootstrap/  { deny all; return 404; }
location ^~ /shop/config/     { deny all; return 404; }
location ^~ /shop/database/   { deny all; return 404; }
location ^~ /shop/lang/       { deny all; return 404; }
location ^~ /shop/modules/    { deny all; return 404; }
location ^~ /shop/node_modules/ { deny all; return 404; }
location ^~ /shop/resources/  { deny all; return 404; }
location ^~ /shop/routes/     { deny all; return 404; }
location ^~ /shop/storage/    { deny all; return 404; }
location ^~ /shop/tests/      { deny all; return 404; }
location ^~ /shop/vendor/     { deny all; return 404; }
location = /shop/composer.json      { deny all; return 404; }
location = /shop/composer.lock      { deny all; return 404; }
location = /shop/package.json       { deny all; return 404; }
location = /shop/package-lock.json  { deny all; return 404; }
location = /shop/phpunit.xml        { deny all; return 404; }
location = /shop/artisan            { deny all; return 404; }
location = /shop/README.md          { deny all; return 404; }
location = /shop/LICENSE            { deny all; return 404; }

# --- PHP execution under /shop ---
location ~ ^/shop/.*\.php$ {
    root /var/www/e-commerce;
    rewrite ^/shop/(.*)$ /$1 break;
    fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_param SCRIPT_NAME /shop/index.php;
}

location = /shop { return 301 /shop/; }

location ^~ /shop/ {
    alias /var/www/e-commerce/;
    index index.php;
    try_files $uri $uri/ @shop_fallback;
}

location @shop_fallback {
    rewrite ^/shop(/.*)?$ /shop/index.php last;
}
